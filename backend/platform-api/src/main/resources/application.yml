server:
  port: ${SGCC_PLATFORM_PORT:8088}

spring:
  datasource:
    url: "${SGCC_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/sgcc_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}"
    username: "${SGCC_MYSQL_USERNAME:sgcc_app}"
    password: "${SGCC_MYSQL_PASSWORD:22b607b72faabc1d52785a3e7a841ac8}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
  data:
    redis:
      host: ${SGCC_REDIS_HOST:127.0.0.1}
      port: ${SGCC_REDIS_PORT:6379}
      password: "${SGCC_REDIS_PASSWORD:4ce8ff831aaa88914fbeeedcb5a58d8f}"
      timeout: 5000
  jackson:
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sgcc:
  privacy:
    base-url: ${SGCC_PRIVACY_BASE_URL:http://127.0.0.1:8010}
  ipfs:
    api-url: ${SGCC_IPFS_API_URL:http://127.0.0.1:5001}
    gateway-url: ${SGCC_IPFS_GATEWAY_URL:http://127.0.0.1:8080}
  postgres:
    url: "${SGCC_POSTGRES_URL:jdbc:postgresql://127.0.0.1:5432/sgcc_meta}"
    username: "${SGCC_POSTGRES_USERNAME:sgcc_pg}"
    password: "${SGCC_POSTGRES_PASSWORD:ef1a9b781475b4c005771ccb5cffff18}"
  blockchain:
    group-id: ${SGCC_CHAIN_GROUP_ID:group0}
    service-user-name: "${SGCC_CHAIN_SERVICE_USER_NAME:sgcc-demo-service}"
    service-private-key: "${SGCC_CHAIN_SERVICE_PRIVATE_KEY:a9769ff0da940c90d2cf62a4e66c0dd7aae76c9d8e1a35422b5b5a43ef870d95}"
    service-address: "${SGCC_CHAIN_SERVICE_ADDRESS:0x1077c260eadd22145bdb2221be0033fd23a2504d}"
    qingdao:
      base-url: ${SGCC_WEBASE_QINGDAO_BASE_URL:http://127.0.0.1:5100/WeBASE-Front}
    weifang:
      base-url: ${SGCC_WEBASE_WEIFANG_BASE_URL:http://127.0.0.1:5101/WeBASE-Front}
    relay:
      base-url: ${SGCC_WEBASE_RELAY_BASE_URL:http://127.0.0.1:5102/WeBASE-Front}

